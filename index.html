<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>一問一答 - 1Q1A</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="style1.css">
    </head>

    <body class="flex flex-col items-center">


        <div id="loading" class="fixed inset-0 bg-white z-50 flex items-center justify-center font-bold text-xl tracking-widest flex-col gap-4">
            <div class="animate-spin h-10 w-10 border-2 border-black border-t-transparent"></div>
            <p>LOADING...</p>
        </div>


        <header id="header" class="hidden w-full max-w-4xl px-4 md:px-8 py-4 md:py-6 flex justify-between items-end">
            <h1 class="text-3xl font-black tracking-tighter" style="text-shadow: 2px 2px 0px #d1d5db;">1Q1A.</h1>
            <nav class="flex gap-4 md:gap-6 text-sm md:text-base">
                <button onclick="nav.go('home')" class="font-bold hover:underline underline-offset-4 decoration-2">HOME</button>
                <button onclick="nav.go('mypage')" class="font-bold hover:underline underline-offset-4 decoration-2">MY PAGE</button>
            </nav>
        </header>

        <main class="w-full max-w-4xl p-4 md:p-8 flex-grow flex flex-col items-center">


            <div id="screen-auth" class="screen w-full max-w-md mt-10 md:mt-20">
                <div class="brutal-box p-6 md:p-10">
                    <h2 id="auth-title" class="text-2xl font-black mb-8 text-center uppercase tracking-widest">LOGIN</h2>

                    <div id="auth-error" class="hidden bg-black text-white p-3 font-bold text-xs mb-6"></div>

                    <form id="auth-form" onsubmit="authApp.handleSubmit(event)" class="space-y-5">
                        <div>
                            <label class="block font-bold mb-1 uppercase text-xs tracking-wider text-gray-500">Email</label>
                            <input type="email" id="auth-email" required class="brutal-input" placeholder="mail@example.com">
                        </div>
                        <div>
                            <label class="block font-bold mb-1 uppercase text-xs tracking-wider text-gray-500">Password</label>
                            <input type="password" id="auth-password" required class="brutal-input" placeholder="••••••••" minlength="6">
                        </div>
                        <button type="submit" class="brutal-btn black w-full py-3 text-lg tracking-widest mt-6">
                            <span id="auth-submit-text">サインイン</span>
                        </button>
                    </form>

                    <div class="mt-8 text-center">
                        <button onclick="authApp.toggleMode()" class="text-sm font-bold border-b border-black pb-0.5 hover:border-transparent transition-colors text-gray-600 hover:text-black">
                            <span id="auth-toggle-text">新規登録はこちら</span> &rarr;
                        </button>
                    </div>
                </div>
            </div>


            <div id="screen-home" class="screen w-full">
                <h2 class="text-2xl font-black mb-6 md:mb-8 border-l-4 border-black pl-3 uppercase tracking-widest">Select Subject</h2>

                <div id="subject-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">

                </div>

                <div id="no-data-msg" class="hidden brutal-box p-6 text-center font-bold mt-8">
                    <p class="text-lg mb-2">NO DATA</p>
                    <p class="text-xs text-gray-500">作問ページからデータを追加してください。</p>
                </div>
            </div>


            <div id="screen-subject" class="screen w-full">
                <button onclick="nav.go('home')" class="font-bold mb-6 hover:underline decoration-2 text-sm text-gray-500 hover:text-black transition-colors">
                    &larr; BACK
                </button>

                <h2 id="subject-title" class="text-3xl md:text-4xl font-black mb-10 tracking-tight uppercase border-b-2 border-black pb-4">Subject Name</h2>

                <div class="mb-10">
                    <h3 class="text-xl font-black mb-4 uppercase tracking-widest text-gray-400">Chapters</h3>
                    <div id="chapter-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">

                    </div>
                </div>

                <div class="pt-6">
                    <button onclick="quizApp.start(state.currentSubject, null)" class="brutal-btn black w-full py-4 text-base tracking-widest uppercase">
                        Shuffle All Chapters
                    </button>
                </div>
            </div>


            <div id="screen-quiz" class="screen w-full">
                <div class="brutal-box p-5 md:p-8 flex flex-col min-h-[400px] md:min-h-[500px]">


                    <div class="flex flex-col md:flex-row justify-between md:items-end border-b-2 border-black pb-3 mb-6 gap-2 md:gap-0">
                        <div class="font-bold text-sm md:text-base uppercase tracking-widest text-gray-600">
                            <span id="quiz-subject-name"></span> <span class="mx-1">/</span> <span id="quiz-chapter-name" class="text-black marker-line"></span>
                        </div>
                        <div class="flex gap-4 text-base font-black">
                            <div>Q.<span id="quiz-current-num" class="text-xl ml-1">1</span><span class="text-xs text-gray-400 ml-1">/ <span id="quiz-total-num">10</span></span></div>
                            <div class="text-gray-400">O: <span id="quiz-score" class="text-black">0</span></div>
                            <div class="text-gray-400">X: <span id="quiz-mistakes" class="text-black">0</span></div>
                        </div>
                    </div>


                    <div id="quiz-question-text" class="text-xl md:text-2xl font-black leading-relaxed mb-8 flex-grow tracking-wide">
                        問題文
                    </div>


                    <div class="mt-auto">


                        <div id="quiz-input-area">
                            <form onsubmit="quizApp.submitAnswer(event)" class="flex flex-col sm:flex-row gap-3 md:gap-4 items-end">
                                <div class="w-full">
                                    <label class="block font-bold uppercase text-xs mb-1 tracking-widest text-gray-400">Answer</label>
                                    <input type="text" id="quiz-answer-input" class="brutal-input" autocomplete="off">
                                </div>
                                <button type="submit" id="quiz-submit-btn" class="brutal-btn black px-8 py-3 w-full sm:w-auto text-base whitespace-nowrap mt-2 sm:mt-0">
                                    判定
                                </button>
                            </form>
                            <div class="mt-4 md:mt-5 flex justify-end gap-4 md:gap-6 pt-3">
                                <button type="button" onclick="quizApp.skip()" class="text-xs font-bold text-gray-400 hover:text-black uppercase tracking-wider transition-colors">
                                    SKIP
                                </button>
                                <button type="button" onclick="quizApp.giveUp()" class="text-xs font-bold text-gray-400 hover:text-black uppercase tracking-wider transition-colors">
                                    GIVE UP
                                </button>
                            </div>
                        </div>


                        <div id="quiz-feedback-area" class="hidden bg-gray-50 border-2 border-black p-5 md:p-6">
                            <div class="flex items-center gap-3 mb-3 md:mb-4" id="quiz-feedback-header">

                            </div>
                            <div class="mb-5 md:mb-6">
                                <p class="font-bold text-xs uppercase tracking-widest text-gray-500 mb-1">Correct Answer</p>
                                <p id="quiz-feedback-answer" class="text-xl md:text-2xl font-black marker-line"></p>
                            </div>
                            <button id="quiz-next-btn" onclick="quizApp.next()" class="brutal-btn black w-full py-3 text-base tracking-widest uppercase">
                                NEXT
                            </button>
                        </div>

                    </div>
                </div>
            </div>


            <div id="screen-result" class="screen w-full">
                <div class="brutal-box p-6 md:p-10 text-center">
                    <h2 class="text-2xl md:text-3xl font-black mb-8 md:mb-10 uppercase tracking-widest">RESULT</h2>

                    <div class="flex flex-row justify-center gap-12 md:gap-20 mb-10 border-b-2 border-black pb-10 border-dashed">
                        <div>
                            <p class="font-bold uppercase tracking-widest text-gray-500 text-xs mb-2">SCORE</p>
                            <p class="text-5xl md:text-6xl font-black"><span id="result-score">0</span><span class="text-xl md:text-2xl text-gray-300 ml-1">/ <span id="result-total">0</span></span></p>
                        </div>
                        <div>
                            <p class="font-bold uppercase tracking-widest text-gray-500 text-xs mb-2">TIME</p>
                            <p class="text-4xl md:text-5xl font-black mt-2 md:mt-3"><span id="result-time-m">0</span><span class="text-base md:text-lg mx-1 text-gray-400">m</span><span id="result-time-s">0</span><span class="text-base md:text-lg ml-1 text-gray-400">s</span></p>
                        </div>
                    </div>

                    <div id="result-mistakes-area" class="mb-10 text-left hidden">
                        <h3 class="font-black text-lg mb-4 uppercase tracking-widest text-gray-400">REVIEW</h3>
                        <ul id="result-mistakes-list" class="space-y-4">

                        </ul>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <button onclick="quizApp.start(state.currentSubject, state.currentChapter)" class="brutal-btn black px-6 py-4 text-sm tracking-widest uppercase w-full sm:w-auto">
                            RETRY
                        </button>
                        <button onclick="nav.go('subject')" class="brutal-btn px-6 py-4 text-sm tracking-widest uppercase w-full sm:w-auto">
                            BACK
                        </button>
                    </div>
                </div>
            </div>


            <div id="screen-mypage" class="screen w-full">
                <h2 class="text-2xl font-black mb-6 md:mb-8 border-l-4 border-black pl-3 uppercase tracking-widest">MY PAGE</h2>

                <div class="brutal-box p-5 md:p-6 flex flex-row items-center gap-4 md:gap-5 mb-8 bg-black text-white">
                    <div id="mypage-avatar" class="w-12 h-12 md:w-14 md:h-14 bg-white text-black flex items-center justify-center font-black text-2xl md:text-3xl">
                        ?
                    </div>
                    <div class="overflow-hidden">
                        <p class="font-bold text-gray-400 text-xs uppercase tracking-widest mb-1">LOGGED IN</p>
                        <p id="mypage-email" class="text-lg md:text-xl font-black truncate">---</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 mb-10">
                    <div class="brutal-box p-6 md:p-8 text-center flex flex-col justify-center">
                        <p class="font-bold uppercase tracking-widest mb-3 text-gray-500 text-xs">ACCURACY</p>
                        <p class="text-4xl md:text-5xl font-black marker-line"><span id="mypage-accuracy">0</span><span class="text-xl md:text-2xl ml-1">%</span></p>
                        <p class="font-bold text-gray-400 mt-3 text-xs md:text-sm"><span id="mypage-correct">0</span> / <span id="mypage-answered">0</span> Correct</p>
                    </div>

                    <div class="brutal-box p-6 md:p-8 text-center flex flex-col justify-center">
                        <p class="font-bold uppercase tracking-widest mb-3 text-gray-500 text-xs">TOTAL TIME</p>
                        <p class="text-3xl md:text-4xl font-black pt-1">
                            <span id="mypage-hours-area" class="hidden"><span id="mypage-hours">0</span><span class="text-lg md:text-xl mx-1 text-gray-400">h</span></span>
                            <span id="mypage-minutes">0</span><span class="text-lg md:text-xl ml-1 text-gray-400">m</span>
                        </p>
                        <p class="font-bold text-gray-400 mt-3 text-xs md:text-sm"><span id="mypage-sessions">0</span> Sessions</p>
                    </div>
                </div>

                <div class="text-center pt-4 md:pt-6 border-t border-gray-300">
                    <button onclick="authApp.logout()" class="font-bold text-sm text-gray-500 hover:text-black uppercase tracking-widest transition-colors">
                        LOGOUT
                    </button>
                </div>
            </div>

        </main>

        <script type="module" src="script1.js"></script>
    </body>

</html>
